kind = "web"
previewPath = "/"
title = "BioSpark - NEET MCQ Platform"
version = "1.0.0"
id = "artifacts/biospark"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/biospark run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/biospark", "run", "build" ]
publicDir = "artifacts/biospark/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
