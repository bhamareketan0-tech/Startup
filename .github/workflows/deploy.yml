name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: cd bio-study-hub && pnpm install

      - name: Build
        run: cd bio-study-hub/artifacts/biospark && pnpm exec vite build --config vite.config.ts
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://startup-85w8.onrender.com' }}
          VITE_GOOGLE_CLIENT_ID: 11610222602-2hjboqcbn10qvv85j47dhi0raib6pd31.apps.googleusercontent.com
          BASE_URL: ${{ vars.BASE_URL || '/Startup/' }}

      - name: Copy 404.html for SPA routing
        run: cp bio-study-hub/artifacts/biospark/dist/public/index.html bio-study-hub/artifacts/biospark/dist/public/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: bio-study-hub/artifacts/biospark/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
